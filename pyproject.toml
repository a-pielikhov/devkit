# Root-level tool configuration for the monorepo.
# Not a package — individual packages live in devkit-*/

[dependency-groups]
dev = [
    "ruff>=0.4",
    "mypy>=1.10",
    "pytest>=8",
    "pytest-mock>=3",
    "pre-commit>=3",
]

[tool.uv.workspace]
members = [
    "devkit-core",
    "devkit-cli",
    "devkit-git",
    "devkit-net",
    "devkit-file",
    "devkit-encode",
]

[tool.uv.sources]
devkit-core = { workspace = true }
devkit-cli = { workspace = true }
devkit-git = { workspace = true }
devkit-net = { workspace = true }
devkit-file = { workspace = true }
devkit-encode = { workspace = true }

[tool.ruff]
target-version = "py311"
line-length = 110

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = [
    "B008",   # do not perform function calls in default arguments (typer pattern)
]

[tool.ruff.lint.isort]
known-first-party = ["devkit_core", "devkit_git", "devkit_net", "devkit_file", "devkit_encode"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true
exclude = ["ai-output", ".*/tests/.*"]
mypy_path = [
    "devkit-core/src",
    "devkit-cli/src",
    "devkit-git/src",
    "devkit-net/src",
    "devkit-file/src",
    "devkit-encode/src",
]

# typer decorators have no complete stubs — suppress across all command modules
disable_error_code = ["untyped-decorator"]

